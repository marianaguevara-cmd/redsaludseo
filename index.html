  }

  #canvas-wrap{
    position:relative;
    flex:1;
    overflow:hidden;
  }

  svg{width:100%;height:100%;display:block;cursor:grab;}
  svg:active{cursor:grabbing;}

  .link{
    fill:none;
    stroke:#c7ccd3;
    stroke-width:1.4px;
  }
  .link.dim{ stroke:#e7e9ec; }

  .node circle{
    stroke-width:2px;
    cursor:pointer;
    transition:r .12s ease;
  }
  .node:hover circle{ filter:brightness(0.85); }
  .node.dim circle{ opacity:.25; }
  .node.dim text{ opacity:.25; }

  .node text{
    font-family:var(--mono);
    font-size:12px;
    fill:var(--ink);
    paint-order:stroke;
    stroke:var(--bg);
    stroke-width:3px;
  }
  .node.leaf text{ fill:#2a2e34; }
  .node .badge{
    font-family:var(--sans);
    font-size:9.5px;
    font-weight:700;
    fill:#fff;
    text-anchor:middle;
    dominant-baseline:middle;
    pointer-events:none;
    stroke:none;
  }
  .node.match circle{ stroke:#1b1f24; stroke-width:3px; }
  .node.match text{ font-weight:700; }

    left:16px;

    border:1px solid var(--line);
    border-radius:10px;
    padding:10px 14px;
    font-size:11.5px;
    display:grid;

  #legend span.dot{width:9px;height:9px;border-radius:50%;display:inline-block;}

    top:14px;
    left:16px;

    border-radius:10px;

    font-size:11.5px;
    color:var(--ink-soft);
    box-shadow:0 4px 14px rgba(0,0,0,.06);
    max-width:260px;
  }

  #tooltip{
    position:absolute;
    pointer-events:none;
    background:#14213d;
    color:#fff;

    right:16px;

    font-size:17px;
    cursor:pointer;
    box-shadow:0 4px 14px rgba(0,0,0,.06);
    color:var(--ink);
  }

const colorMap = {
  root: 'var(--c-root)',
  sucursales: 'var(--c-sucursales)',
  especialidades: 'var(--c-especialidades)',
  profesionales: 'var(--c-profesionales)',
  campanas: 'var(--c-campanas)',
  noticias: 'var(--c-noticias)',
  blog: 'var(--c-blog)',
  'clinicas-dentales': 'var(--c-clinicas-dentales)',
  'seguros-de-salud': 'var(--c-seguros-de-salud)',
  'informacion-pacientes': 'var(--c-informacion-pacientes)',
};
function resolveColor(v){ return getComputedStyle(document.documentElement).getPropertyValue(v.replace('var(','').replace(')','')).trim() || v; }
const legendNames = {
  sucursales:'Sucursales', especialidades:'Especialidades', profesionales:'Profesionales',
  campanas:'Campañas', noticias:'Noticias', blog:'Blog', 'clinicas-dentales':'Clínicas Dentales',
  'seguros-de-salud':'Seguros de Salud', 'informacion-pacientes':'Información Pacientes'
};

function branchColor(d){
  let n = d;
  while(n.depth > 1) n = n.parent;
  const key = n.data.key;
  return resolveColor(colorMap[key] || colorMap.root);
}

const svg = d3.select('#svg');
const wrap = document.getElementById('canvas-wrap');
let width = wrap.clientWidth, height = wrap.clientHeight;

const g = svg.append('g');
const gLinks = g.append('g').attr('class','links');
const gNodes = g.append('g').attr('class','nodes');

const zoom = d3.zoom().scaleExtent([0.05, 4]).on('zoom', (ev)=>{ g.attr('transform', ev.transform); });
svg.call(zoom);

const dx = 26, dy = 240;
const tree = d3.tree().nodeSize([dx, dy]);
const root = d3.hierarchy(DATA, d => d.children);
root.x0 = 0; root.y0 = 0;

root.descendants().forEach((d,i)=>{
  d.id = i;
  d._children = d.children;
  if(d.depth >= 2) d.children = null; // collapse beyond level 2 by default
});

let leafTotal = root.leaves().length;
document.getElementById('counter').textContent = leafTotal + ' páginas';

function colorFor(d){
  if(d.depth === 0) return resolveColor(colorMap.root);
  return branchColor(d);
}

function update(source){
  tree(root);
  const nodes = root.descendants();
  const links = root.links();

  let left = root, rightMost = root;
  root.eachBefore(d=>{ if(d.x < left.x) left = d; if(d.x > rightMost.x) rightMost = d; });
  const heightNeeded = rightMost.x - left.x + 80;

  const transition = svg.transition().duration(380);

  const node = gNodes.selectAll('g.node').data(nodes, d=>d.id);

  const nodeEnter = node.enter().append('g')
    .attr('class', d => 'node' + (d.children || d._children ? '' : ' leaf'))
    .attr('transform', d => `translate(${source.y0 ?? d.y},${source.x0 ?? d.x})`)
    .attr('data-id', d=>d.id)
    .on('click', (event,d) => {
      if(d._children){
        d.children = d.children ? null : d._children;
        update(d);
      } else if(d.data.url){
        window.open(d.data.url, '_blank');
      }
    })
    .on('mouseenter', (event,d)=> showTooltip(event,d))
    .on('mousemove', (event)=> moveTooltip(event))
    .on('mouseleave', hideTooltip);

  nodeEnter.append('circle')
    .attr('r', 0)
    .attr('fill', d => (d.children || d._children) ? colorFor(d) : '#fff')
    .attr('stroke', d => colorFor(d));

  nodeEnter.append('text')
    .attr('dy', '0.32em')
    .attr('x', d => (d._children ? -10 : 10))
    .attr('text-anchor', d => d._children ? 'end' : 'start')
    .text(d => d.data.name)
    .style('font-weight', d => d.depth <= 1 ? 600 : 400)
    .style('font-size', d => d.depth === 0 ? '13px' : d.depth===1 ? '12.5px' : '11.5px');

  nodeEnter.filter(d=>d._children && d.children===null)
    .append('text')
    .attr('class','badge')
    .attr('x', -10)
    .attr('dy', '-0.9em')
    .text(d => countLeaves(d));

  const nodeUpdate = node.merge(nodeEnter);
  nodeUpdate.transition(transition)
    .attr('transform', d => `translate(${d.y},${d.x})`);
  nodeUpdate.select('circle')
    .attr('r', d => d.depth===0 ? 9 : (d.children||d._children ? 7 : 4.5))
    .attr('fill', d => (d.children || d._children) ? colorFor(d) : '#fff')
    .attr('stroke', d => colorFor(d));
  nodeUpdate.select('text:not(.badge)')
    .attr('x', d => (d._children || d.children) ? -10 : 10)
    .attr('text-anchor', d => (d._children || d.children) ? 'end' : 'start');
  nodeUpdate.select('.badge').text(d => countLeaves(d));

  node.exit().transition(transition).remove()
    .attr('transform', d => `translate(${source.y},${source.x})`)
    .select('circle').attr('r', 0);

  const link = gLinks.selectAll('path.link').data(links, d => d.target.id);

  const linkGen = d3.linkHorizontal().x(d=>d.y).y(d=>d.x);

  const linkEnter = link.enter().append('path')
    .attr('class','link')
    .attr('stroke', d => colorFor(d.target))
    .attr('d', d => {
      const o = {x: source.x0 ?? d.source.x, y: source.y0 ?? d.source.y};
      return linkGen({source:o, target:o});
    });

  link.merge(linkEnter).transition(transition)
    .attr('d', linkGen)
    .attr('stroke', d => colorFor(d.target));

  link.exit().transition(transition).remove()
    .attr('d', d => {
      const o = {x: source.x, y: source.y};
      return linkGen({source:o, target:o});
    });

  root.eachBefore(d => { d.x0 = d.x; d.y0 = d.y; });
}

function countLeaves(d){
  let n = d._children || d.children || [];
  let count = 0;
  function walk(arr){
    arr.forEach(c=>{
      const kids = c._children || c.children;
      if(kids && kids.length) walk(kids); else count++;
    });
  }
  walk(n);
  return count;
}

update(root);

function fitToScreen(animate){
  width = wrap.clientWidth; height = wrap.clientHeight;
  const nodes = root.descendants();
  const xExtent = d3.extent(nodes, d=>d.x);
  const yExtent = d3.extent(nodes, d=>d.y);
  const fullW = (yExtent[1]-yExtent[0]) + 260;
  const fullH = (xExtent[1]-xExtent[0]) + 80;
  const scale = Math.min(2, Math.min(width/fullW, height/fullH));
  const tx = 90 - yExtent[0]*scale;
  const ty = height/2 - ((xExtent[0]+xExtent[1])/2)*scale;
  const t = d3.zoomIdentity.translate(tx, ty).scale(scale);
  if(animate) svg.transition().duration(500).call(zoom.transform, t);
  else svg.call(zoom.transform, t);
}
setTimeout(()=>fitToScreen(false), 60);

window.addEventListener('resize', ()=>fitToScreen(true));

document.getElementById('zoomIn').onclick = ()=> svg.transition().duration(200).call(zoom.scaleBy, 1.3);
document.getElementById('zoomOut').onclick = ()=> svg.transition().duration(200).call(zoom.scaleBy, 1/1.3);
document.getElementById('resetView').onclick = ()=> fitToScreen(true);

document.getElementById('expandAll').onclick = ()=>{
  root.each(d=>{ if(d._children) d.children = d._children; });
  update(root);
  setTimeout(()=>fitToScreen(true), 400);
};
document.getElementById('collapseAll').onclick = ()=>{
  root.each(d=>{ if(d.depth >= 1 && d._children) d.children = null; });
  update(root);
  setTimeout(()=>fitToScreen(true), 400);
};

// tooltip
const tooltip = document.getElementById('tooltip');
function showTooltip(event,d){
  let html = '';
  if(d.data.url){
    html += `<div class="t-title">${escapeHtml(d.data.h1 || d.data.title || d.data.name)}</div>`;
    html += `<div class="t-url">${d.data.url}</div>`;
    html += `<div class="t-meta">Clics: <b>${Math.round(d.data.clics||0)}</b> · Impresiones: <b>${Math.round(d.data.impresiones||0)}</b> · Pos. media: <b>${(d.data.posicion||0).toFixed ? d.data.posicion.toFixed(1) : d.data.posicion}</b></div>`;
  } else {
    html += `<div class="t-title">${escapeHtml(d.data.name)}</div>`;
    html += `<div class="t-meta">${countLeaves(d)} páginas en esta rama</div>`;
  }
  tooltip.innerHTML = html;
  tooltip.style.opacity = 1;
  moveTooltip(event);
}
function moveTooltip(event){
  const rect = wrap.getBoundingClientRect();
  let x = event.clientX - rect.left + 18;
  let y = event.clientY - rect.top + 12;
  if(x + 340 > rect.width) x = event.clientX - rect.left - 350;
  tooltip.style.left = x+'px';
  tooltip.style.top = y+'px';
}
function hideTooltip(){ tooltip.style.opacity = 0; }
function escapeHtml(s){ return (s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// search
const searchInput = document.getElementById('search');
searchInput.addEventListener('input', ()=>{
  const q = searchInput.value.trim().toLowerCase();
  if(!q){
    gNodes.selectAll('g.node').classed('dim', false).classed('match', false);
    gLinks.selectAll('path.link').classed('dim', false);
    return;
  }
  // expand everything so matches are reachable
  root.each(d=>{ if(d._children) d.children = d._children; });
  update(root);
  setTimeout(()=>{
    gNodes.selectAll('g.node').each(function(d){
      const hay = ((d.data.name||'')+' '+(d.data.url||'')+' '+(d.data.title||'')+' '+(d.data.h1||'')).toLowerCase();
      const isMatch = hay.includes(q);
      d3.select(this).classed('match', isMatch).classed('dim', !isMatch);
    });
    gLinks.selectAll('path.link').classed('dim', d => {
      const hay = ((d.target.data.name||'')+' '+(d.target.data.url||'')+' '+(d.target.data.title||'')+' '+(d.target.data.h1||'')).toLowerCase();
      return !hay.includes(q);
    });
  }, 420);
});

// legend
const legend = document.getElementById('legend');
Object.keys(legendNames).forEach(k=>{
  const div = document.createElement('div');
  div.innerHTML = `<span class="dot" style="background:${resolveColor(colorMap[k])}"></span>${legendNames[k]}`;
  legend.appendChild(div);
});
</script>
</body>
